security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            pattern: ^/
            provider: app_user_provider
            entry_point: form_login
            custom_authenticators:
                - App\Security\GoogleAuthenticator
            form_login:
                login_path: login
                check_path: login
                default_target_path: /app
                enable_csrf: true
                remember_me: true
            remember_me:
                secret: '%env(APP_SECRET)%'
                lifetime: 1209600   # 14 days
                remember_me_parameter: _remember_me
                always_remember_me: true   # Google OAuth gets remember-me too
            logout:
                path: logout
                target: /
                delete_cookies:
                    - REMEMBERME
            lazy: true

    access_control:
        - { path: ^/manifest\.json$, roles: PUBLIC_ACCESS }
        - { path: ^/sw\.js$, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/connect/, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/features, roles: PUBLIC_ACCESS }
        - { path: ^/how-it-works, roles: PUBLIC_ACCESS }
        - { path: ^/security, roles: PUBLIC_ACCESS }
        - { path: ^/faq, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/app, roles: ROLE_USER }
        - { path: ^/settings, roles: ROLE_USER }
        - { path: ^/profiles, roles: ROLE_USER }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
