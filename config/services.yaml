services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $projectDir: '%kernel.project_dir%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Command\ImportFileSettingsCommand:
        arguments:
            $adminEmail: '%env(APP_ADMIN_EMAIL)%'
            $adminPasswordHash: '%env(APP_AUTH_PASSWORD_HASHED)%'

    # DB-only: file storage removed
    App\Service\Storage\PositionLockStorageInterface: '@App\Service\Storage\DbPositionLockStorage'
    App\Service\Storage\PendingActionStorageInterface: '@App\Service\Storage\DbPendingActionStorage'
    App\Service\Storage\PositionPlanStorageInterface: '@App\Service\Storage\DbPositionPlanStorage'
    App\Service\Storage\CircuitBreakerStorageInterface: '@App\Service\Storage\DbCircuitBreakerStorage'
    App\Service\Storage\BotHistoryStorageInterface: '@App\Service\Storage\DbBotHistoryStorage'
    App\Service\Storage\BotRunStorageInterface: '@App\Service\Storage\DbBotRunStorage'

    App\Service\Memory\QdrantClientService:
        arguments:
            $host: '%env(QDRANT_HOST)%'
            $port: '%env(int:QDRANT_PORT)%'
            $collection: '%env(QDRANT_COLLECTION)%'
            $apiKey: '%env(default::QDRANT_API_KEY)%'
