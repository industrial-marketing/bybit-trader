services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $projectDir: '%kernel.project_dir%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Command\ImportFileSettingsCommand:
        arguments:
            $adminEmail: '%env(APP_ADMIN_EMAIL)%'
            $adminPasswordHash: '%env(APP_AUTH_PASSWORD_HASHED)%'

    App\Service\Storage\PositionLockStorageInterface: '@App\Service\Storage\PositionLockStorage'
    App\Service\Storage\PendingActionStorageInterface: '@App\Service\Storage\PendingActionStorage'
    App\Service\Storage\PositionPlanStorageInterface: '@App\Service\Storage\PositionPlanStorage'
    App\Service\Storage\CircuitBreakerStorageInterface: '@App\Service\Storage\CircuitBreakerStorage'
    App\Service\Storage\BotHistoryStorageInterface: '@App\Service\Storage\BotHistoryStorage'
    App\Service\Storage\BotRunStorageInterface: '@App\Service\Storage\BotRunStorage'
