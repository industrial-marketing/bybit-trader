services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bybit_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MySQL — опционально, если нужна БД в Docker.
  # Использовать: QDRANT_HOST=qdrant, DATABASE_URL=mysql://root:ChangeMe@mysql:3306/bybit_trader?...
